services:
  app:
    image: zkracht/pipeline-test:${IMAGE_TAG:-latest}
    ports:
      - "3099:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  app-network:
    external: true
